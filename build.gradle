plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation("org.seleniumhq.selenium:selenium-java:4.43.0")
    // Source: https://mvnrepository.com/artifact/org.testng/testng
    testImplementation("org.testng:testng:7.11.0")
}

test {
    useTestNG() {
        useDefaultListeners = true //dùng để tạo report testNG
        outputDirectory = file("$projectDir/test_output") // folder chứa testNG report
    }
}